name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BINARY_NAME: l2access

# ─────────────────────────────────────────────────────────────
# Shared target matrix used by both `build` and `package` jobs.
# Each entry defines a Rust cross-compile target and the
# corresponding architecture names for every package format.
# ─────────────────────────────────────────────────────────────
# rust-target          → cross-rs target triple
# deb-arch             → Debian/Ubuntu architecture name
# rpm-arch             → RPM architecture name
# openwrt-arch         → OpenWrt ipkg architecture name

jobs:
  # ── Stage 1: Compile ──────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.rust-target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust-target: x86_64-unknown-linux-musl
            deb-arch: amd64
            rpm-arch: x86_64
            openwrt-arch: x86_64
          - rust-target: aarch64-unknown-linux-musl
            deb-arch: arm64
            rpm-arch: aarch64
            openwrt-arch: aarch64_cortex-a53
          - rust-target: armv7-unknown-linux-musleabihf
            deb-arch: armhf
            rpm-arch: armv7hl
            openwrt-arch: arm_cortex-a7_neon-vfpv4
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build static binary
        run: cross build --release --target ${{ matrix.rust-target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.rust-target }}
          path: target/${{ matrix.rust-target }}/release/${{ env.BINARY_NAME }}
          if-no-files-found: error

  # ── Stage 2: Package ──────────────────────────────────────────────────────
  package:
    name: Package (${{ matrix.rust-target }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust-target: x86_64-unknown-linux-musl
            deb-arch: amd64
            rpm-arch: x86_64
            openwrt-arch: x86_64
          - rust-target: aarch64-unknown-linux-musl
            deb-arch: arm64
            rpm-arch: aarch64
            openwrt-arch: aarch64_cortex-a53
          - rust-target: armv7-unknown-linux-musleabihf
            deb-arch: armhf
            rpm-arch: armv7hl
            openwrt-arch: arm_cortex-a7_neon-vfpv4
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download compiled binary
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.rust-target }}
          path: dist/

      - name: Read version and set permissions
        run: |
          chmod 755 dist/${{ env.BINARY_NAME }}
          VERSION=$(grep '^version =' Cargo.toml | cut -d '"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install packaging tools (fpm + rpm support)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y rpm ruby ruby-dev
          sudo gem install fpm --no-document

      # ── .tar.gz — static binary archive ───────────────────────────────────
      - name: Package → .tar.gz
        run: |
          mkdir -p release
          tar -czf release/${{ env.BINARY_NAME }}-${{ env.VERSION }}-${{ matrix.rust-target }}.tar.gz \
            -C dist ${{ env.BINARY_NAME }}

      # ── .deb ──────────────────────────────────────────────────────────────
      - name: Package → .deb
        run: |
          fpm -s dir -t deb \
            --name        ${{ env.BINARY_NAME }} \
            --version     ${{ env.VERSION }} \
            --architecture ${{ matrix.deb-arch }} \
            --description "Secure, zero-configuration L2-tunnelled IP connectivity over local networks" \
            --license     MIT \
            --url         "https://github.com/${{ github.repository }}" \
            --depends     libcap2 \
            --package     release/${{ env.BINARY_NAME }}_${{ env.VERSION }}_${{ matrix.deb-arch }}.deb \
            dist/${{ env.BINARY_NAME }}=/usr/bin/${{ env.BINARY_NAME }}

      # ── .rpm ──────────────────────────────────────────────────────────────
      - name: Package → .rpm
        run: |
          fpm -s dir -t rpm \
            --name        ${{ env.BINARY_NAME }} \
            --version     ${{ env.VERSION }} \
            --architecture ${{ matrix.rpm-arch }} \
            --description "Secure, zero-configuration L2-tunnelled IP connectivity over local networks" \
            --license     MIT \
            --url         "https://github.com/${{ github.repository }}" \
            --package     release/${{ env.BINARY_NAME }}-${{ env.VERSION }}-1.${{ matrix.rpm-arch }}.rpm \
            dist/${{ env.BINARY_NAME }}=/usr/bin/${{ env.BINARY_NAME }}

      # ── .ipk — OpenWrt ────────────────────────────────────────────────────
      - name: Package → .ipk (OpenWrt)
        run: |
          mkdir -p ipk/data/usr/bin ipk/data/etc/config ipk/data/etc/init.d ipk/control

          cp dist/${{ env.BINARY_NAME }}          ipk/data/usr/bin/
          cp openwrt/files/l2access.config       ipk/data/etc/config/l2access
          cp openwrt/files/l2access.init         ipk/data/etc/init.d/l2access

          chmod 755 ipk/data/usr/bin/${{ env.BINARY_NAME }}
          chmod 755 ipk/data/etc/init.d/l2access
          chmod 644 ipk/data/etc/config/l2access

          SIZE=$(du -bs ipk/data/usr/bin/${{ env.BINARY_NAME }} | cut -f1)

          echo "Package: ${{ env.BINARY_NAME }}"                                                          > ipk/control/control
          echo "Version: ${{ env.VERSION }}-1"                                                           >> ipk/control/control
          echo "Architecture: ${{ matrix.openwrt-arch }}"                                                >> ipk/control/control
          echo "Depends: libc, libip4tc, libip6tc, ip-full"                                              >> ipk/control/control
          echo "License: MIT"                                                                             >> ipk/control/control
          echo "Section: net"                                                                             >> ipk/control/control
          echo "Installed-Size: $SIZE"                                                                   >> ipk/control/control
          echo "Description: Secure, zero-configuration L2-tunnelled IP connectivity over local networks." >> ipk/control/control

          echo "2.0" > ipk/debian-binary
          tar --owner=root --group=root -C ipk/data    -czf ipk/data.tar.gz    .
          tar --owner=root --group=root -C ipk/control -czf ipk/control.tar.gz .
          tar --owner=root --group=root \
            -czf release/${{ env.BINARY_NAME }}_${{ env.VERSION }}-1_${{ matrix.openwrt-arch }}.ipk \
            -C ipk ./debian-binary ./control.tar.gz ./data.tar.gz

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.rust-target }}
          path: release/
          if-no-files-found: error

  # ── Stage 3: Release ──────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          path: release/
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
