name: OpenWrt Build

on:
  push:
    tags:
      - 'v*'
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            Changes in this Release
            - First Change
            - Second Change
          draft: false
          prerelease: false

  build_openwrt:
    name: Build OpenWrt IPK (${{ matrix.openwrt-arch }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust-target: aarch64-unknown-linux-musl
            openwrt-arch: aarch64_cortex-a53
          - rust-target: x86_64-unknown-linux-musl
            openwrt-arch: x86_64
          - rust-target: armv7-unknown-linux-musleabihf
            openwrt-arch: arm_cortex-a7_neon-vfpv4

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary with cross
        run: cross build --release --target ${{ matrix.rust-target }}

      - name: Collect dependencies and prepare IPK
        id: pkg
        run: |
          mkdir -p ipk_build/data/usr/bin
          mkdir -p ipk_build/data/etc/config
          mkdir -p ipk_build/data/etc/init.d
          mkdir -p ipk_build/control

          cp target/${{ matrix.rust-target }}/release/l2access ipk_build/data/usr/bin/
          cp openwrt/files/l2access.config ipk_build/data/etc/config/l2access
          cp openwrt/files/l2access.init ipk_build/data/etc/init.d/l2access

          chmod 755 ipk_build/data/usr/bin/l2access
          chmod 755 ipk_build/data/etc/init.d/l2access
          chmod 644 ipk_build/data/etc/config/l2access

          SIZE=$(du -bs ipk_build/data/usr/bin/l2access | cut -f1)
          VERSION=$(grep '^version =' Cargo.toml | cut -d '"' -f 2 || echo "0.1.0")

          echo "Package: l2access" > ipk_build/control/control
          echo "Version: ${VERSION}-1" >> ipk_build/control/control
          echo "Depends: libc, libip4tc, libip6tc, ip-full" >> ipk_build/control/control
          echo "License: MIT" >> ipk_build/control/control
          echo "Section: net" >> ipk_build/control/control
          echo "Architecture: ${{ matrix.openwrt-arch }}" >> ipk_build/control/control
          echo "Installed-Size: $SIZE" >> ipk_build/control/control
          echo "Description: Secure, zero-configuration L2-tunnelled IP connectivity over local networks." >> ipk_build/control/control

          cd ipk_build
          echo "2.0" > debian-binary

          tar --owner=root --group=root -C data -czvf data.tar.gz .
          tar --owner=root --group=root -C control -czvf control.tar.gz .

          IPK_FILENAME="l2access_${VERSION}-1_${{ matrix.openwrt-arch }}.ipk"
          tar --owner=root --group=root -czvf $IPK_FILENAME ./debian-binary ./control.tar.gz ./data.tar.gz

          echo "IPK deployment packaged generated."
          mv $IPK_FILENAME ../
          echo "ipk_filename=$IPK_FILENAME" >> $GITHUB_OUTPUT

      - name: Upload IPK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.build.outputs.upload_url }}
          asset_path: ${{ steps.pkg.outputs.ipk_filename }}
          asset_name: ${{ steps.pkg.outputs.ipk_filename }}
          asset_content_type: application/gzip
