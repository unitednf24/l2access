name: OpenWrt Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_openwrt:
    name: Build OpenWrt IPK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary with cross
        run: cross build --release --profile release --target aarch64-unknown-linux-musl
        
      - name: Collect dependencies and prepare IPK
        run: |
          # Create packaging directory structure
          mkdir -p ipk_build/data/usr/bin
          mkdir -p ipk_build/data/etc/config
          mkdir -p ipk_build/data/etc/init.d
          mkdir -p ipk_build/control

          # Copy binaries and scripts
          cp target/aarch64-unknown-linux-musl/release/l2access ipk_build/data/usr/bin/
          cp openwrt/files/l2access.config ipk_build/data/etc/config/l2access
          cp openwrt/files/l2access.init ipk_build/data/etc/init.d/l2access
          
          # Set proper execute permissions exactly as OpenWrt expects
          chmod 755 ipk_build/data/usr/bin/l2access
          chmod 755 ipk_build/data/etc/init.d/l2access
          chmod 644 ipk_build/data/etc/config/l2access

          # Calculate total installed size for the IPK manifest
          SIZE=$(du -bs ipk_build/data/usr/bin/l2access | cut -f1)

          # Generate the control file mimicking rust-package.mk output
          cat <<EOF > ipk_build/control/control
Package: l2access
Version: 0.1.0-1
Depends: libc, libip4tc, libip6tc, ip-full
License: MIT
Section: net
Architecture: aarch64_generic
Installed-Size: $SIZE
Description: Secure, zero-configuration L2-tunnelled IP connectivity over local networks.
EOF

          cd ipk_build
          # IMPORTANT: opkg expects debian-binary to say "2.0"
          echo "2.0" > debian-binary

          # Archive the file trees (must be standard tar.gz exactly as opkg unpacks them)
          tar --owner=root --group=root -C data -czvf data.tar.gz .
          tar --owner=root --group=root -C control -czvf control.tar.gz .

          # Construct the final .ipk (must preserve order: debian-binary, control, data)
          tar --owner=root --group=root -czvf l2access_0.1.0-1_aarch64_generic.ipk ./debian-binary ./control.tar.gz ./data.tar.gz
          echo "IPK package generated successfully."
          
      - name: Upload IPK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: l2access-openwrt-aarch64
          path: ipk_build/l2access_0.1.0-1_aarch64_generic.ipk
